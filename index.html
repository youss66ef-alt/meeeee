<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yousef | يوسف</title>
    <style>
        /* إعدادات الشاشة السوداء */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* شاشة سوداء */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        .container {
            text-align: center;
        }

        /* تنسيق الاسم */
        .name {
            font-size: 80px; /* حجم عريض جداً */
            font-weight: 900;
            color: #ff6600; /* لون برتقالي */
            text-transform: uppercase;
            letter-spacing: 5px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 4px solid #ff6600; /* مؤشر الكتابة */
            width: 0;
            animation: 
                typing 3s steps(20) forwards, 
                blink 0.5s step-end infinite alternate,
                glow 2s ease-in-out infinite;
            text-shadow: 0 0 10px #ff6600, 0 0 20px #ff6600;
        }

        /* تأثير الأنيميشن للكتابة */
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* تأثير وميض المؤشر */
        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* تأثير التوهج */
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #ff6600, 0 0 20px #ff6600; }
            50% { text-shadow: 0 0 20px #ff9933, 0 0 40px #ff6600, 0 0 60px #ff3300; }
        }

        /* استجابة للهواتف */
        @media (max-width: 600px) {
            .name {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="name">YOUSEF | يوسف</div>
    </div>

</body>
</html>
